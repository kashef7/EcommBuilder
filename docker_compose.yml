version: '3.8'

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

services:
  # --- NGINX REVERSE PROXY & API GATEWAY ---
  nginx-gateway:
    build: ./nginx
    container_name: ecomm-nginx-gateway
    ports:
      - "80:80"
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - frontend_app
      - auth-service
      - products-service
      - shop-service
      - order-service

  # --- FRONTEND (REACT / NODE 22) ---
  frontend_app:
    build: ./frontend
    container_name: ecomm-frontend-app
    networks:
      - frontend-net

  # ========================================================
  # 1. AUTHENTICATION SERVICE & DATABASE
  # ========================================================
  auth-service:
    build: ./services/auth-service
    container_name: ecomm-auth-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=auth-db;Port=5432;Database=${AUTH_DB_NAME};Username=${AUTH_DB_USER};Password=${AUTH_DB_PASSWORD};
    networks:
      - backend-net
    depends_on:
      - auth-db

  auth-db:
    image: postgres:15-alpine
    container_name: ecomm-auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${DB_PORT_MAPPING_AUTH:-}"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - backend-net

  # ========================================================
  # 2. PRODUCTS SERVICE & DATABASE
  # ========================================================
  products-service:
    build: ./services/products-service
    container_name: ecomm-products-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=products-db;Port=5432;Database=${PRODUCTS_DB_NAME};Username=${PRODUCTS_DB_USER};Password=${PRODUCTS_DB_PASSWORD};
    networks:
      - backend-net
    depends_on:
      - products-db

  products-db:
    image: postgres:15-alpine
    container_name: ecomm-products-db
    environment:
      POSTGRES_USER: ${PRODUCTS_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCTS_DB_PASSWORD}
      POSTGRES_DB: ${PRODUCTS_DB_NAME}
    ports:
      - "${DB_PORT_MAPPING_PRODUCTS:-}"
    volumes:
      - products_db_data:/var/lib/postgresql/data
    networks:
      - backend-net

  # ========================================================
  # 3. SHOP SERVICE & DATABASE
  # ========================================================
  shop-service:
    build: ./services/shop-service
    container_name: ecomm-shop-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=shop-db;Port=5432;Database=${SHOP_DB_NAME};Username=${SHOP_DB_USER};Password=${SHOP_DB_PASSWORD};
    networks:
      - backend-net
    depends_on:
      - shop-db

  shop-db:
    image: postgres:15-alpine
    container_name: ecomm-shop-db
    environment:
      POSTGRES_USER: ${SHOP_DB_USER}
      POSTGRES_PASSWORD: ${SHOP_DB_PASSWORD}
      POSTGRES_DB: ${SHOP_DB_NAME}
    ports:
      - "${DB_PORT_MAPPING_SHOP:-}"
    volumes:
      - shop_db_data:/var/lib/postgresql/data
    networks:
      - backend-net

  # ========================================================
  # 4. ORDERING SERVICE & DATABASE
  # ========================================================
  order-service:
    build: ./services/ordering-service
    container_name: ecomm-ordering-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=order-db;Port=5432;Database=${ORDER_DB_NAME};Username=${ORDER_DB_USER};Password=${ORDER_DB_PASSWORD};
    networks:
      - backend-net
    depends_on:
      - order-db

  order-db:
    image: postgres:15-alpine
    container_name: ecomm-order-db
    environment:
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    ports:
      - "${DB_PORT_MAPPING_ORDER:-}"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - backend-net

# Persistent Docker Volumes for Databases
volumes:
  auth_db_data:
    driver: local
  products_db_data:
    driver: local
  shop_db_data:
    driver: local
  order_db_data:
    driver: local