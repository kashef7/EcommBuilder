server {
    listen 80;
    server_name _;

    # Increase maximum upload size if your e-commerce app uploads product images
    client_max_body_size 20M;

    location / {
        # Targets your internal Kubernetes service name directly
        proxy_pass http://ecomm-monolith-service.default.svc.cluster.local:80;
        
        # Essential headers for forwarding requests accurately
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}